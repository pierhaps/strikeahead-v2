<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#0A1828" />
    <meta name="color-scheme" content="dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="StrikeAhead" />
    <meta name="description" content="StrikeAhead — Fish smarter. Your mobile companion for smart angling: logbook, tides, bait intelligence, licenses." />

    <title>StrikeAhead – Fish smarter.</title>

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/brand/logo/Mark_Gradient.svg" color="#2DA8FF" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      html, body { background: #0A1828; }
      /* Initial loader spinner while React hydrates */
      #sa-boot {
        position: fixed; inset: 0; display: grid; place-items: center;
        background: radial-gradient(ellipse at top, #0E1E30 0%, #0A1828 60%);
        z-index: 9999; transition: opacity .4s ease;
      }
      #sa-boot.hide { opacity: 0; pointer-events: none; }
      #sa-boot .ring {
        width: 56px; height: 56px; border-radius: 50%;
        background: conic-gradient(from 180deg, #B6F03C, #2EE0C9, #2DA8FF, #B6F03C);
        mask: radial-gradient(farthest-side, transparent 62%, #000 64%);
        -webkit-mask: radial-gradient(farthest-side, transparent 62%, #000 64%);
        animation: sa-spin 1.2s linear infinite;
        filter: drop-shadow(0 0 18px rgba(46,224,201,0.45));
      }
      @keyframes sa-spin { to { transform: rotate(360deg); } }
    </style>

    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root"></div>
    <div id="sa-boot"><div class="ring" aria-hidden="true"></div></div>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const b = document.getElementById('sa-boot');
          if (b) { b.classList.add('hide'); setTimeout(() => b.remove(), 500); }
        }, 300);
      });
    </script>
  </body>
</html>
